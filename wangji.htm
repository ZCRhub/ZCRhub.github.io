<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>找回密码 - CYBER RESET</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Roboto,monospace}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#050508;position:relative;overflow:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 50%,#101025,#050508);z-index:-2}
body::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background-image:
linear-gradient(transparent 95%,rgba(0,255,255,0.05) 95%),
linear-gradient(90deg,rgba(255,0,200,0.03) 1px,transparent 1px);
background-size:100% 40px,40px 100%;z-index:-1;opacity:0.4}

.reset-box{background:rgba(12,12,24,0.7);backdrop-filter:blur(12px);width:100%;max-width:420px;padding:40px;
border-radius:18px;border:2px solid rgba(0,255,255,0.2);box-shadow:0 0 40px rgba(0,150,255,0.15);
animation:fadeIn 0.6s ease,glitchCard 5s infinite linear alternate-reverse;position:relative;overflow:hidden}
.reset-box::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;
background:linear-gradient(90deg,transparent,rgba(0,200,255,0.08),transparent);transition:0.8s}
.reset-box:hover::before{left:100%}

@keyframes fadeIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glitchCard{0%,100%{border-color:rgba(0,255,255,0.2)}50%{border-color:rgba(255,0,200,0.3)}}

.reset-box h2{text-align:center;margin-bottom:35px;color:#0ff;font-size:26px;font-weight:700;
text-shadow:0 0 10px #0ff,0 0 25px #0ff;position:relative;display:inline-block;left:50%;
transform:translateX(-50%);overflow:hidden;white-space:nowrap;
animation:typing 3s steps(30,end),blink-caret 0.75s step-end infinite}
.reset-box h2::after{content:"找回密码";position:absolute;top:0;left:0;width:100%;height:100%;
color:#f0f;overflow:hidden;clip:rect(0,900px,0,0);animation:glitch-anim 2s infinite linear alternate-reverse}

@keyframes typing{from{width:0}to{width:100%}}
@keyframes blink-caret{from,to{border-color:transparent}50%{border-color:#0ff}}
@keyframes glitch-anim{
0%{clip:rect(36px,9999px,9px,0)}5%{clip:rect(12px,9999px,45px,0)}10%{clip:rect(48px,9999px,77px,0)}
15%{clip:rect(42px,9999px,73px,0)}20%{clip:rect(63px,9999px,86px,0)}25%{clip:rect(36px,9999px,90px,0)}
30%{clip:rect(66px,9999px,73px,0)}35%{clip:rect(10px,9999px,94px,0)}40%{clip:rect(2px,9999px,48px,0)}
45%{clip:rect(82px,9999px,73px,0)}50%{clip:rect(54px,9999px,84px,0)}55%{clip:rect(28px,9999px,99px,0)}
60%{clip:rect(59px,9999px,50px,0)}65%{clip:rect(41px,9999px,62px,0)}70%{clip:rect(2px,9999px,82px,0)}
75%{clip:rect(30px,9999px,71px,0)}80%{clip:rect(15px,9999px,98px,0)}85%{clip:rect(66px,9999px,30px,0)}
90%{clip:rect(85px,9999px,72px,0)}95%{clip:rect(71px,9999px,75px,0)}100%{clip:rect(74px,9999px,47px,0)}}

.input-group{margin-bottom:22px;position:relative}
.input-group label{display:block;margin-bottom:8px;color:#aaf;font-size:14px;text-shadow:0 0 5px rgba(0,255,255,0.5)}
.input-group input{width:100%;padding:14px 16px;background:rgba(20,20,40,0.8);border:1px solid rgba(0,255,255,0.3);
border-radius:10px;font-size:15px;transition:all 0.3s;outline:none;color:#fff;box-shadow:0 0 10px rgba(0,255,255,0.1)}
.input-group input:focus{border-color:#0ff;box-shadow:0 0 15px rgba(0,255,255,0.4);transform:translateY(-2px)}

/* 查看密码按钮 */
.view-btn{width:100%;padding:15px;background:linear-gradient(90deg,#44ce7b,#22c55e);color:#fff;
border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.3s;
margin-top:10px;box-shadow:0 0 15px rgba(0,200,255,0.3)}
.view-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,255,100,0.35)}

/* 提示框 */
#tip{margin-top:20px;text-align:center;color:#0ff;text-shadow:0 0 8px #0ff;font-weight:bold}

.link-group{text-align:center;margin-top:25px;font-size:14px}
.link-group a{color:#0ff;text-decoration:none;text-shadow:0 0 8px #0ff;transition:0.2s}
.link-group a:hover{color:#f0f;text-shadow:0 0 8px #f0f;text-decoration:underline}
</style>
</head>

<body>
<div class="reset-box">
  <h2>找回密码</h2>
  <div class="input-group">
    <label>输入注册时的用户名</label>
    <input type="text" id="checkUser" required>
  </div>
  <button class="view-btn" id="viewBtn">查 看 密 码</button>
  <div id="tip"></div>
  <div class="link-group">
    <a href="denglu.html">返回登录</a>
  </div>
</div>

<script>
document.getElementById('viewBtn').addEventListener('click', () => {
  const input = document.getElementById('checkUser').value.trim();
  const user = localStorage.getItem('registeredUser');
  const pwd = localStorage.getItem('registeredPwd');
  const tip = document.getElementById('tip');
  
  if(!user || !pwd){
    tip.textContent='暂无注册信息';
    return;
  }
  if(input !== user){
    tip.textContent='用户名不正确';
    return;
  }
  tip.textContent = `您的密码：${pwd}`;
});
</script>
</body>
</html>
